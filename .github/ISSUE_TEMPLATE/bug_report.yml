name: Bug report
description: Report a patching, scanning, compatibility, or residual-English problem
title: "[Bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a report. Please provide enough detail to reproduce the issue.
  - type: input
    id: openclaw_version
    attributes:
      label: OpenClaw version
      placeholder: "Example: 2026.3.12"
    validations:
      required: true
  - type: input
    id: tool_version
    attributes:
      label: openclaw-zh-tool version or commit
      placeholder: "Example: 0.3.0 or commit hash"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Windows
        - Linux
        - Other
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: What happened
      description: Describe the problem clearly.
      placeholder: "What did you expect, and what did you see instead?"
    validations:
      required: true
  - type: textarea
    id: commands
    attributes:
      label: Relevant command output
      description: Paste output from verify, doctor, residuals, or report if available.
      render: shell
  - type: textarea
    id: residuals
    attributes:
      label: Residual strings or screenshots
      description: Paste leftover English strings or attach screenshots.
  - type: textarea
    id: extra
    attributes:
      label: Extra context
      description: Add anything else useful for reproduction.
