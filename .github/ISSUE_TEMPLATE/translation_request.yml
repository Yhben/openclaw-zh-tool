name: Translation request
description: Request a missing translation or better wording for a UI string
title: "[Translation] "
labels:
  - translation
body:
  - type: input
    id: openclaw_version
    attributes:
      label: OpenClaw version
      placeholder: "Example: 2026.3.12"
    validations:
      required: true
  - type: input
    id: route
    attributes:
      label: Route or page
      placeholder: "Example: /config or /automation"
    validations:
      required: true
  - type: textarea
    id: english_text
    attributes:
      label: English text still visible
      description: Paste the exact string if possible.
    validations:
      required: true
  - type: textarea
    id: suggested_translation
    attributes:
      label: Suggested Chinese translation
      description: Provide your preferred wording if you have one.
  - type: textarea
    id: context
    attributes:
      label: Context or screenshot
      description: Add UI context, behavior notes, or screenshots.
